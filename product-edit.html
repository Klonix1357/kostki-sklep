<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Świat Kostek - panel administratora - edytuj produkt</title>
  <meta name="robots" content="noindex">

  <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand mb-0 h1">
    Panel administratora — Świat Kostek
  </span>

  <button class="btn btn-outline-light btn-sm d-lg-none"id="sidebarToggle">☰ Menu</button>

  <button class="btn btn-outline-light btn-sm d-none d-lg-inline" onclick="window.location.href = 'index.html'">
    Wyloguj
  </button>
</nav>

<div class="container-fluid">
  <div class="row">

    <div class="col-lg-2 sidebar collapse-sidebar" id="sidebar">
      <h6 class="mt-3">Menu</h6>
      <a href="admin-dashboard.html" class="sidebar-link">Dashboard</a>
      <a href="products-list.html" class="sidebar-link active">Towary</a>
      <a href="#" class="sidebar-link">Zamówienia</a>
      <a href="#" class="sidebar-link">Użytkownicy</a>
    </div>

    <div class="col-lg-10 p-4">
      <h3 class="mb-4">Edytuj produkt</h3>
      <div class="admin-card p-4">
        <form class="admin-form">
          <div class="mb-3">
            <label for="productName" class="form-label">Nazwa produktu</label>
            <input type="text" id="productName" class="form-control" value="GAN 356 M">
          </div>
      
          <div class="mb-3">
            <label for="productDescription" class="form-label">Opis</label>
            <textarea id="productDescription" class="form-control">Profesjonalna kostka speedcube</textarea>
          </div>
      
          <div class="mb-3">
            <label for="productPrice" class="form-label">Cena (zł)</label>
            <input type="number" id="productPrice" class="form-control" value="59">
          </div>
      
          <div class="mb-3">
            <label for="productStock" class="form-label">Stan magazynowy</label>
            <input type="number" id="productStock" class="form-control" value="42">
          </div>
      
          <div class="mb-3">
            <label for="productImage" class="form-label">Zdjęcie produktu</label>
            <input type="file" id="productImage" class="form-control">
          </div>
      
          <button class="btn btn-primary mt-3">
            Zapisz zmiany
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<footer class="admin-footer">Strona utworzona przez: Kacper Majocha 4TP | © 2026 Świat Kostek - Panel Administratora</footer>

<script src="bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
