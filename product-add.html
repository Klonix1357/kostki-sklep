  <meta name="robots" content="noindex">

  <link rel="stylesheet" href="bootstrap-5.3.8-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/admin.css">
  <link rel="shortcut icon" href="img/favicon.png" type="image/x-icon">
</head>
<body>

<nav class="navbar navbar-dark bg-dark px-3">
  <span class="navbar-brand mb-0 h1">
    Panel administratora — Świat Kostek
  </span>

  <button class="btn btn-outline-light btn-sm d-lg-none"id="sidebarToggle">☰ Menu</button>

  <button class="btn btn-outline-light btn-sm d-none d-lg-inline" onclick="window.location.href = 'index.html'">

<div class="container-fluid">

    <div class="col-lg-2 sidebar collapse-sidebar" id="sidebar">
      <h6 class="mt-3">Menu</h6>
      <a href="admin-dashboard.html" class="sidebar-link">Dashboard</a>

    <div class="col-lg-10 p-4">

      <h3 class="mb-4">Dodaj produkt</h3>

      <div class="admin-card p-4">

        <form class="admin-form">

          <input type="text" class="form-control" placeholder="Nazwa produktu">

          <textarea class="form-control" placeholder="Opis"></textarea>

          <input type="number" class="form-control" placeholder="Cena">

          <input type="number" class="form-control" placeholder="Stan magazynowy">

          <input type="file" class="form-control">

          <button class="btn btn-success mt-3">
            Zapisz produkt
          </button>

        </form>
      </div>
    </div>
  </div>
</div>
